<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para vos ❤️</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to top, #ffe6e6, #fff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #d6336c;
      margin-bottom: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    .bouquet {
      position: relative;
      width: 200px;
      height: 300px;
      margin: auto;
    }

    .stem {
      width: 6px;
      height: 150px;
      background: green;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .flower {
      position: absolute;
      width: 60px;
      height: 60px;
      background: pink;
      border-radius: 50%;
      animation: float 3s ease-in-out infinite;
    }

    .flower::before,
    .flower::after {
      content: "";
      position: absolute;
      width: 60px;
      height: 60px;
      background: pink;
      border-radius: 50%;
    }

    .flower::before {
      top: -30px;
      left: 0;
    }

    .flower::after {
      left: -30px;
      top: 0;
    }

    .f1 { top: 0; left: 70px; }
    .f2 { top: 30px; left: 20px; }
    .f3 { top: 30px; left: 120px; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .message {
      margin-top: 30px;
    }

    .romantic {
      font-size: 22px;
      color: #b30059;
      line-height: 1.6;
      animation: fadeIn 3s ease-in-out;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .heart {
      color: red;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Para vos 💐</h1>

    <div class="bouquet">
      <div class="flower f1"></div>
      <div class="flower f2"></div>
      <div class="flower f3"></div>
      <div class="stem"></div>
    </div>

    <div class="message">
      <p class="romantic">
        Perdón por todo, amor 💔<br>
        Si pudiera, te llenaría de flores de verdad…<br>
        pero hoy te hice estas con todo mi corazón 🌸
      </p>
    </div>
  </div>
</body>
</html>
