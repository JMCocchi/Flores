<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para vos ❤️</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to top, #ffd6e0, #fff);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.container {
  text-align: center;
  padding: 20px;
}

/* TITULO */
h1 {
  color: #d6336c;
  font-size: 26px;
  margin-bottom: 10px;
}

/* RAMO */
.bouquet {
  position: relative;
  width: 220px;
  height: 260px;
  margin: 0 auto;
}

/* TALLOS */
.stem {
  width: 5px;
  height: 140px;
  background: green;
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
}

/* HOJAS */
.leaf {
  width: 30px;
  height: 15px;
  background: green;
  border-radius: 20px;
  position: absolute;
}

.leaf1 { bottom: 80px; left: 90px; transform: rotate(-30deg); }
.leaf2 { bottom: 60px; left: 110px; transform: rotate(30deg); }

/* FLORES */
.flower {
  position: absolute;
  width: 55px;
  height: 55px;
  background: #ff99bb;
  border-radius: 50%;
  animation: float 3s ease-in-out infinite;
}

.flower::before,
.flower::after {
  content: "";
  position: absolute;
  width: 55px;
  height: 55px;
  background: #ff99bb;
  border-radius: 50%;
}

.flower::before { top: -25px; }
.flower::after { left: -25px; }

/* POSICIONES */
.f1 { top: 0; left: 80px; }
.f2 { top: 30px; left: 30px; }
.f3 { top: 30px; left: 130px; }
.f4 { top: 70px; left: 60px; }
.f5 { top: 70px; left: 110px; }

/* ANIMACION FLORES */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* MENSAJE */
.message {
  margin-top: 20px;
  padding: 10px;
}

.romantic {
  font-size: 18px;
  color: #b30059;
  line-height: 1.5;
  animation: fadeIn 3s ease;
}

/* ANIMACION TEXTO */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px);}
  to { opacity: 1; transform: translateY(0);}
}

/* CORAZONES FLOTANDO */
.heart {
  position: fixed;
  bottom: -10px;
  color: red;
  animation: rise 6s linear infinite;
}

@keyframes rise {
  0% { transform: translateY(0); opacity: 1;}
  100% { transform: translateY(-100vh); opacity: 0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>Para vos 💐</h1>

  <div class="bouquet">
    <div class="flower f1"></div>
    <div class="flower f2"></div>
    <div class="flower f3"></div>
    <div class="flower f4"></div>
    <div class="flower f5"></div>

    <div class="leaf leaf1"></div>
    <div class="leaf leaf2"></div>

    <div class="stem"></div>
  </div>

  <div class="message">
    <p class="romantic">
      Perdón por todo, amor 💔<br>
      Si pudiera, te llenaría de flores de verdad…<br>
      pero hoy te hice estas con todo mi corazón 🌸
    </p>
  </div>
</div>

<!-- CORAZONES -->
<script>
function crearCorazon() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 10 + 15) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(crearCorazon, 800);
</script>

</body>
</html>
